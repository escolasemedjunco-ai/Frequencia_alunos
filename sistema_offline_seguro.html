<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frequência Escolar Offline</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
header, footer { background:#1565c0; color:#fff; text-align:center; padding:10px; }
.container { padding:15px; max-width:500px; margin:auto; }
input, select { width:100%; padding:10px; margin-bottom:6px; }
.status { font-size:12px; margin-bottom:10px; }
button { width:100%; padding:12px; margin-top:6px; border:none; background:#2e7d32; color:#fff; font-weight:bold; cursor:pointer; }
#reader { margin-top:10px; }
.log { background:#fff; padding:10px; margin-top:10px; border-radius:6px; font-size:13px; }
.badge { padding:5px; background:#ff9800; color:#fff; border-radius:5px; font-size:12px; }
</style>
</head>

<body>

<header>
  <h2>📚 Sistema de Frequência</h2>
  <p id="nomeEscolaHeader">Sistema Offline Seguro</p>
</header>

<div class="container">

<label>Nome da Escola</label>
<input type="text" id="nomeEscola">
<div id="statusEscola" class="status"></div>

<label>URL do Google Apps Script</label>
<input type="text" id="scriptUrl">
<div id="statusUrl" class="status"></div>

<label>Turno</label>
<select id="turno">
<option>Manhã</option>
<option>Tarde</option>
<option>Noite</option>
</select>

<div class="badge">Registros pendentes: <span id="pendentes">0</span></div>

<button onclick="startScanner()">▶ Iniciar QR</button>
<button onclick="stopScanner()">⏹ Parar</button>

<div id="reader"></div>

<div class="log" id="log">Nenhum registro ainda.</div>

<button onclick="sincronizar()">🔄 Sincronizar agora</button>

</div>

<footer id="nomeEscolaFooter">Sistema Offline Seguro</footer>

<script>
// Nome escola
(function(){
const input = document.getElementById('nomeEscola');
const header = document.getElementById('nomeEscolaHeader');
const footer = document.getElementById('nomeEscolaFooter');

const salvo = localStorage.getItem('nomeEscola');
if(salvo){
input.value = salvo;
header.textContent = salvo;
footer.textContent = salvo;
}

input.addEventListener('input', ()=>{
localStorage.setItem('nomeEscola', input.value);
header.textContent = input.value;
footer.textContent = input.value;
});
})();

// URL
document.getElementById('scriptUrl').addEventListener('input', function(){
localStorage.setItem('scriptUrl', this.value);
});

// QR
let scanner;
function startScanner(){
scanner = new Html5Qrcode("reader");
scanner.start({ facingMode: "environment" }, { fps: 10 }, txt=>registrar(txt));
}
function stopScanner(){
if(scanner) scanner.stop();
}

// REGISTRO OFFLINE
function registrar(id){
const turno = document.getElementById('turno').value;
const escola = localStorage.getItem('nomeEscola') || '';
const data = new Date().toISOString();

const registro = {id, turno, escola, data, enviado:false};

let lista = JSON.parse(localStorage.getItem('registros') || '[]');
lista.push(registro);
localStorage.setItem('registros', JSON.stringify(lista));

atualizarTela();
}

// Atualizar tela
function atualizarTela(){
let lista = JSON.parse(localStorage.getItem('registros') || '[]');

document.getElementById('pendentes').textContent = lista.filter(r=>!r.enviado).length;

let html = '';
lista.slice().reverse().forEach(r=>{
html += `${r.id} | ${r.turno} | ${r.enviado ? '✅' : '⏳'}<br>`;
});

document.getElementById('log').innerHTML = html || 'Nenhum registro';
}

// SINCRONIZAÇÃO
async function sincronizar(){
const url = localStorage.getItem('scriptUrl');
if(!url) return alert('Configure a URL');

let lista = JSON.parse(localStorage.getItem('registros') || '[]');

for(let r of lista){
if(!r.enviado){
try{
await fetch(url,{
method:'POST',
mode:'no-cors',
body: JSON.stringify(r)
});
r.enviado = true;
}catch(e){}
}
}

localStorage.setItem('registros', JSON.stringify(lista));
atualizarTela();
}

// auto sync a cada 30s
setInterval(sincronizar, 30000);

// init
atualizarTela();
</script>

</body>
</html>
